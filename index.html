<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMG Tracker - Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#cc0000">
    <style>
        :root { 
            --primary-red: #cc0000; 
            --dark-red: #990000; 
            --white: #ffffff; 
            --text-dark: #333333; 
            --green: #25D366; 
        }

        body { 
            margin: 0; 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto;
            /* MENGGUNAKAN FAIL LOKAL background.jpg */
            background: #f0f2f5 url('background.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .overlay { 
            background: rgba(255, 255, 255, 0.88); /* Sedikit lebih telus untuk nampak background */
            min-height: 100vh; 
            backdrop-filter: blur(5px); 
            padding-bottom: 40px; 
        }

        header { 
            text-align: center; 
            padding: 25px 20px; 
            background: var(--white); 
            border-bottom: 5px solid var(--primary-red); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        .logo-container {
            margin-bottom: 8px;
        }
        
        .logo { 
            max-width: 150px; /* Saiz logo */
            height: auto;
        }
        
        .container { 
            width: 95%; 
            max-width: 1100px; 
            margin: 20px auto; 
            padding: 20px; 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 15px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }

        /* Navigasi */
        .nav-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn { flex: 1; padding: 15px 5px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; background: var(--primary-red); color: white; font-size: 0.9rem; transition: 0.3s; }
        .nav-btn:hover { background: var(--dark-red); }
        .nav-btn.admin { background: #444; }

        /* Form & Inputs */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 0.9rem; color: var(--primary-red); }
        .form-group input, .form-group select { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box;
        }

        /* Jadual */
        .table-wrapper { overflow-x: auto; margin-top: 20px; border-radius: 10px; border: 1px solid #eee; background: white; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 600px; }
        th { background: var(--primary-red); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: top; }

        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-weight: bold; background: #fff5f5; color: var(--primary-red); border: 1px solid var(--primary-red); font-size: 0.75rem; }
        .admin-tag { font-size: 0.7rem; color: #777; display: block; margin-top: 4px; line-height: 1.2; }

        .btn-action { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .btn-wa { background: var(--green); color: white; text-decoration: none; display: inline-block; text-align: center; }
        .btn-del { background: #ff4444; color: white; }

        .section { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (min-width: 768px) {
            .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        }
    </style>
</head>
<body>

<div class="overlay">
    <header>
        <div class="logo-container">
            <img src="logo.png" alt="Logo Arif Maju Group" class="logo">
        </div>
        <h1 style="margin:0; font-size: 1.3rem; color: var(--primary-red);">ARIF MAJU GROUP</h1>
    </header>

    <div class="container">
        <div class="nav-buttons">
            <button class="nav-btn" onclick="showSection('customerSection')">👤 SEMAK STATUS</button>
            <button class="nav-btn admin" id="adminNavBtn">🔐 AKSES STAFF</button>
        </div>

        <div id="customerSection" class="section active">
            <div style="max-width: 500px; margin: 0 auto;">
                <h3 style="text-align:center;">Status Kerja Pelanggan</h3>
                <input type="tel" id="custSearchPhone" class="form-group" style="width:100%; padding:18px; border:2px solid var(--primary-red); border-radius:12px; box-sizing:border-box; font-size: 1.1rem; text-align: center;" placeholder="No Telefon (Cth: 0123456789)">
                <button onclick="searchCustomerJobs()" style="width:100%; padding:15px; background:var(--primary-red); color:white; border:none; border-radius:12px; font-weight:bold; margin-top:15px; cursor: pointer;">SEMAK SEKARANG</button>
                <div id="customerResults"></div>
            </div>
        </div>

        <div id="loginSection" class="section">
            <div style="max-width: 400px; margin: 0 auto;">
                <h3 style="text-align:center">Staff Login</h3>
                <div class="form-group"><label>Email:</label><input type="email" id="loginEmail" placeholder="admin@email.com"></div>
                <div class="form-group"><label>Password:</label><input type="password" id="loginPass" placeholder="******"></div>
                <button id="doLoginBtn" style="width:100%; padding:12px; background:#444; color:white; border:none; border-radius:8px;">LOG MASUK</button>
            </div>
        </div>

        <div id="adminSection" class="section">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; background:#f9f9f9; padding:12px; border-radius:10px;">
                <span style="font-size:0.8rem;">Admin: <b id="adminEmail"></b></span>
                <div>
                    <button onclick="showSection('directorySection')" class="btn-action" style="background:#555; color:white; margin-right:5px;">DIREKTORI</button>
                    <button id="doLogoutBtn" class="btn-action btn-del">LOGOUT</button>
                </div>
            </div>

            <form id="jobForm" style="background:#fffcfc; padding:20px; border:1px solid #ffdcdc; border-radius:12px;">
                <div class="grid-inputs">
                    <div class="form-group">
                        <label>Nama Pelanggan:</label>
                        <input type="text" id="adName" list="customerList" required>
                        <datalist id="customerList"></datalist>
                    </div>
                    <div class="form-group">
                        <label>No. Telefon:</label>
                        <input type="tel" id="adPhone" list="phoneList" required>
                        <datalist id="phoneList"></datalist>
                    </div>
                </div>
                <div class="form-group"><label>Nama Projek / Item:</label><input type="text" id="adJobName" required></div>
                <div class="grid-inputs">
                    <div class="form-group"><label>Tarikh Jangkaan:</label><input type="date" id="adDate"></div>
                    <div class="form-group">
                        <label>Status:</label>
                        <select id="adStatus">
                            <option>Dalam Giliran</option><option>Sedang Disemak</option><option>Proses Design</option>
                            <option>Proses Cetak</option><option>Proses Welding</option><option>Proses Tampal</option><option>Siap</option>
                        </select>
                    </div>
                </div>
                <button type="submit" style="width:100%; padding:14px; background:var(--primary-red); color:white; border:none; border-radius:8px; font-weight:bold;">SIMPAN REKOD</button>
            </form>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Pelanggan</th>
                            <th>Info Kerja</th>
                            <th>Jangkaan</th>
                            <th>Status & Audit</th>
                            <th>Tindakan</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="directorySection" class="section">
            <h3>Direktori Pelanggan</h3>
            <button onclick="showSection('adminSection')" class="nav-btn" style="background:#555; margin-bottom:10px; max-width: 150px;">← KEMBALI</button>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Nama</th><th>No. Telefon</th><th>Aksi</th></tr></thead>
                    <tbody id="directoryTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    // Logic Firebase kekal sama seperti kod asal anda
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAQy5m_5eCQn933gsbugq8Fg0AiRTu3CKo",
        authDomain: "track-job-progress.firebaseapp.com",
        projectId: "track-job-progress",
        storageBucket: "track-job-progress.firebasestorage.app",
        messagingSenderId: "463137015561",
        appId: "1:463137015561:web:f5bafcd445d804a3a0f5d8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let jobs = JSON.parse(localStorage.getItem('arif_jobs')) || [];
    let customers = JSON.parse(localStorage.getItem('arif_customers')) || [];
    let currentUser = null;

    const statusOptions = ["Dalam Giliran", "Sedang Disemak", "Proses Design", "Proses Cetak", "Proses Welding", "Proses Tampal", "Siap"];

    window.showSection = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'adminSection') renderAdminTable();
        if(id === 'directorySection') renderDirectory();
        updateDatalists();
    };

    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if(user) {
            document.getElementById('adminEmail').innerText = user.email.split('@')[0];
            showSection('adminSection');
        } else {
            showSection('customerSection');
        }
    });

    document.getElementById('adminNavBtn').onclick = () => currentUser ? showSection('adminSection') : showSection('loginSection');
    document.getElementById('doLogoutBtn').onclick = () => signOut(auth);
    document.getElementById('doLoginBtn').onclick = () => {
        const e = document.getElementById('loginEmail').value;
        const p = document.getElementById('loginPass').value;
        signInWithEmailAndPassword(auth, e, p).catch(err => alert("Ralat: " + err.message));
    };

    function updateDatalists() {
        document.getElementById('customerList').innerHTML = customers.map(c => `<option value="${c.name}">`).join('');
        document.getElementById('phoneList').innerHTML = customers.map(c => `<option value="${c.phone}">`).join('');
    }

    document.getElementById('adName').addEventListener('input', (e) => {
        const found = customers.find(c => c.name === e.target.value);
        if(found) document.getElementById('adPhone').value = found.phone;
    });

    document.getElementById('adPhone').addEventListener('input', (e) => {
        const found = customers.find(c => c.phone === e.target.value);
        if(found) document.getElementById('adName').value = found.name;
    });

    document.getElementById('jobForm').onsubmit = (e) => {
        e.preventDefault();
        const phone = document.getElementById('adPhone').value.replace(/\s|-/g, '');
        const name = document.getElementById('adName').value;
        
        const newJob = {
            id: Date.now(), 
            phone, 
            name,
            jobName: document.getElementById('adJobName').value,
            date: document.getElementById('adDate').value || "Tiada",
            status: document.getElementById('adStatus').value,
            updatedBy: currentUser.email.split('@')[0],
            updatedAt: new Date().toLocaleString('ms-MY', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' })
        };

        jobs.push(newJob);
        if(!customers.find(c => c.phone === phone)) {
            customers.push({name, phone});
            localStorage.setItem('arif_customers', JSON.stringify(customers));
        }
        localStorage.setItem('arif_jobs', JSON.stringify(jobs));
        renderAdminTable();
        e.target.reset();
        alert("Rekod berjaya ditambah!");
    };

    window.inlineUpdateStatus = (id, newStatus) => {
        const job = jobs.find(j => j.id === id);
        if(job) {
            job.status = newStatus;
            job.updatedBy = currentUser.email.split('@')[0];
            job.updatedAt = new Date().toLocaleString('ms-MY', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
            localStorage.setItem('arif_jobs', JSON.stringify(jobs));
            renderAdminTable();
        }
    };

    window.deleteJob = (id) => { if(confirm("Padam kerja ini?")) { jobs = jobs.filter(j => j.id !== id); localStorage.setItem('arif_jobs', JSON.stringify(jobs)); renderAdminTable(); }};
    window.deleteCust = (ph) => { if(confirm("Padam data pelanggan ini?")) { customers = customers.filter(c => c.phone !== ph); localStorage.setItem('arif_customers', JSON.stringify(customers)); renderDirectory(); }};

    function renderAdminTable() {
        const body = document.getElementById('adminTableBody');
        body.innerHTML = [...jobs].reverse().map(j => `
            <tr>
                <td><strong>${j.name}</strong><br><small>${j.phone}</small></td>
                <td>${j.jobName}</td>
                <td>${j.date}</td>
                <td>
                    <span class="status-badge">${j.status}</span>
                    <span class="admin-tag">👤 ${j.updatedBy}</span>
                    <span class="admin-tag">⏰ ${j.updatedAt}</span>
                </td>
                <td>
                    <div style="display:flex; flex-direction:column; gap:4px;">
                        <select style="font-size:11px;" onchange="inlineUpdateStatus(${j.id}, this.value)">
                            ${statusOptions.map(opt => `<option value="${opt}" ${j.status === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                        </select>
                        <button class="btn-action btn-del" onclick="deleteJob(${j.id})">PADAM</button>
                        ${j.status === 'Siap' ? `<button class="btn-action btn-wa" onclick="sendWhatsApp('${j.phone}', '${j.name}', '${j.jobName}')">WHATSAPP</button>` : ''}
                    </div>
                </td>
            </tr>`).join('');
    }

    function renderDirectory() {
        document.getElementById('directoryTableBody').innerHTML = customers.map(c => `
            <tr>
                <td>${c.name}</td>
                <td>${c.phone}</td>
                <td><button class="btn-action btn-del" onclick="deleteCust('${c.phone}')">X</button></td>
            </tr>`).join('');
    }

    window.sendWhatsApp = (phone, name, jobName) => {
        const msg = `Salam ${name}, tempahan *${jobName}* anda telah SIAP. Boleh ambil di kedai. Terima kasih!`;
        window.open(`https://wa.me/6${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    };

    window.searchCustomerJobs = () => {
        const p = document.getElementById('custSearchPhone').value.replace(/\s|-/g, '');
        const res = jobs.filter(j => j.phone === p);
        const resDiv = document.getElementById('customerResults');
        if(!p) return;
        resDiv.innerHTML = res.length ? `<div style="margin-top:20px; border:2px solid var(--primary-red); padding:15px; border-radius:12px; background:white;">` + res.map(j => `
            <div style="margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">
                <strong>${j.jobName}</strong><br>
                Status: <span class="status-badge">${j.status}</span><br>
                <small>Jangkaan: ${j.date} | Update: ${j.updatedAt}</small>
            </div>`).join('') + `</div>` : "<p style='color:red; text-align:center; font-weight:bold; margin-top:15px;'>Tiada data ditemui.</p>";
    };
</script>
</body>
</html>
